# Fine-tuning configuration for Parakeet-TDT 0.6b on RTX 3090
pretrained_model: "nvidia/parakeet-tdt-0.6b-v3"

model:
  train_ds:
    manifest_filepath: "multimed_train_manifest.json"
    sample_rate: 16000
    batch_size: 16         # Optimized for 24GB VRAM
    shuffle: True
    num_workers: 8         # Matches typical WSL CPU core allocation
    pin_memory: True
    max_duration: 20.0     # Omit files longer than 20s to prevent OOM
    trim_silence: False

  validation_ds:
    manifest_filepath: "multimed_test_manifest.json"
    sample_rate: 16000
    batch_size: 16
    shuffle: False
    num_workers: 8
    pin_memory: True

  optim:
    name: adamw
    lr: 1e-4               # Lower learning rate for fine-tuning
    weight_decay: 0.001
    sched:
      name: CosineAnnealing
      warmup_steps: 500
      min_lr: 1e-6

trainer:
  devices: 1
  accelerator: "gpu"
  strategy: "auto"
  precision: "16-mixed"   # Vital for RTX 3090 Tensor Cores
  max_epochs: 5
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0
  enable_checkpointing: True
  logger: False

exp_manager:
  exp_dir: "nemo_experiments"
  name: "medical_parakeet_tdt"
  create_tensorboard_logger: True
  create_checkpoint_callback: True
  checkpoint_callback_params:
    monitor: "val_wer"
    mode: "min"
    save_top_k: 3